app = "wa-notifier-yehuda"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  STORE_DIR = "/data"

[[mounts]]
  source = "bridge_store"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # WhatsApp Web holds a persistent websocket; never stop.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
